<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f7f2e9">
<title>Paklijst Schotland — Nora &amp; Mats</title>
<style>
  :root {
    --paper: #f7f2e9;
    --card: #fffdf8;
    --ink: #2b2723;
    --muted: #7a7167;
    --rule: #e6ddcf;
    --rule-strong: #d6cab6;
    --shadow: 0 1px 2px rgba(60,50,35,.06), 0 6px 20px rgba(60,50,35,.05);
    --nora: #c2477a;
    --nora-soft: #f7e4ec;
    --mats: #2c7c8c;
    --mats-soft: #dceff1;
    --done: #4f7a3a;
    --radius: 16px;
    --radius-sm: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  :root[data-theme="dark"], :root:not([data-theme="light"]) {
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #171512;
      --card: #201d19;
      --ink: #f0e9dd;
      --muted: #a99f92;
      --rule: #332e27;
      --rule-strong: #433c32;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
      --nora: #ec7aa8;
      --nora-soft: #3a2029;
      --mats: #6fc2d1;
      --mats-soft: #16333a;
      --done: #8ec26f;
    }
  }
  :root[data-theme="dark"] {
    --paper: #171512;
    --card: #201d19;
    --ink: #f0e9dd;
    --muted: #a99f92;
    --rule: #332e27;
    --rule-strong: #433c32;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
    --nora: #ec7aa8;
    --nora-soft: #3a2029;
    --mats: #6fc2d1;
    --mats-soft: #16333a;
    --done: #8ec26f;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--font);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 580px; margin: 0 auto; padding: 22px 16px 60px; }

  header { text-align: center; margin-bottom: 18px; }
  .eyebrow {
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); font-weight: 700;
  }
  h1 { margin: 4px 0 2px; font-size: 27px; letter-spacing: -.01em; }
  .sub { color: var(--muted); font-size: 14px; }

  /* Kind-tabs */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin: 20px 0 16px;
  }
  .tab {
    appearance: none; cursor: pointer; font-family: inherit;
    border: 1.5px solid var(--rule-strong); background: var(--card);
    color: var(--ink); border-radius: var(--radius);
    padding: 12px 10px; font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .tab .avatar {
    width: 26px; height: 26px; border-radius: 50%; flex: none;
    display: grid; place-items: center; color: #fff; font-size: 14px; font-weight: 800;
  }
  .tab[data-kid="nora"] .avatar { background: var(--nora); }
  .tab[data-kid="mats"] .avatar { background: var(--mats); }
  .tab:active { transform: scale(.98); }
  .tab[aria-selected="true"][data-kid="nora"] { border-color: var(--nora); background: var(--nora-soft); }
  .tab[aria-selected="true"][data-kid="mats"] { border-color: var(--mats); background: var(--mats-soft); }
  .tab[aria-selected="false"] { opacity: .62; }

  /* Progress */
  .progress-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 20px;
  }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .progress-label { font-weight: 700; font-size: 15px; }
  .progress-count { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 14px; font-weight: 600; }
  .bar { height: 10px; background: var(--rule); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; width: 0%; border-radius: 999px; transition: width .35s cubic-bezier(.16,1,.3,1); }
  body[data-active="nora"] .bar > span { background: var(--nora); }
  body[data-active="mats"] .bar > span { background: var(--mats); }
  .celebrate { margin-top: 10px; font-weight: 700; font-size: 14px; color: var(--done); display: none; }
  .celebrate.show { display: block; }

  /* Category */
  .cat { margin-bottom: 22px; }
  .cat-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); font-weight: 800; margin: 0 4px 10px;
  }
  .cat-emoji { font-size: 15px; }
  .cat-count { margin-left: auto; letter-spacing: 0; text-transform: none; font-size: 12px; }

  ul.items { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  li.item {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
  }
  li.item label {
    display: flex; align-items: flex-start; gap: 13px; padding: 13px 14px; cursor: pointer;
  }
  li.item input { position: absolute; opacity: 0; width: 1px; height: 1px; }
  .box {
    flex: none; width: 24px; height: 24px; margin-top: 1px;
    border: 2px solid var(--rule-strong); border-radius: 7px; background: var(--paper);
    display: grid; place-items: center; transition: background .12s ease, border-color .12s ease;
  }
  .box svg { width: 15px; height: 15px; stroke: #fff; stroke-width: 3.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 22; stroke-dashoffset: 22; transition: stroke-dashoffset .18s ease; }
  body[data-active="nora"] li.item input:checked + .box { background: var(--nora); border-color: var(--nora); }
  body[data-active="mats"] li.item input:checked + .box { background: var(--mats); border-color: var(--mats); }
  li.item input:checked + .box svg { stroke-dashoffset: 0; }
  li.item input:focus-visible + .box { outline: 2px solid var(--ink); outline-offset: 2px; }

  .txt { flex: 1; min-width: 0; }
  .name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .name { font-weight: 600; font-size: 15.5px; }
  .qty {
    flex: none; font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 800;
    color: var(--muted); background: var(--rule); border-radius: 6px; padding: 1px 7px;
  }
  .note { color: var(--muted); font-size: 13px; margin-top: 3px; }
  li.item input:checked ~ .txt .name { text-decoration: line-through; text-decoration-thickness: 2px; color: var(--muted); }
  li.item input:checked ~ .txt { opacity: .62; }

  .toolbar { display: flex; justify-content: center; margin-top: 8px; }
  .reset {
    appearance: none; background: none; border: none; font-family: inherit; cursor: pointer;
    color: var(--muted); font-size: 13px; text-decoration: underline; padding: 8px;
  }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body data-active="nora">
  <div class="wrap">
    <header>
      <div class="eyebrow">Schotland · 10–24 juli 2026</div>
      <h1>Paklijst</h1>
      <div class="sub">Vink af wat in je koffer zit — je vinkjes worden bewaard.</div>
    </header>

    <div class="tabs" role="tablist" aria-label="Kies wie je bent">
      <button class="tab" role="tab" data-kid="nora" aria-selected="true">
        <span class="avatar">N</span> Nora
      </button>
      <button class="tab" role="tab" data-kid="mats" aria-selected="false">
        <span class="avatar">M</span> Mats
      </button>
    </div>

    <div class="progress-card">
      <div class="progress-top">
        <span class="progress-label" id="progressWho">Nora's koffer</span>
        <span class="progress-count" id="progressCount">0 / 0 ingepakt</span>
      </div>
      <div class="bar"><span id="progressBar"></span></div>
      <div class="celebrate" id="celebrate">🎉 Helemaal ingepakt! Klaar voor Schotland.</div>
    </div>

    <main id="list"></main>

    <div class="toolbar">
      <button class="reset" id="resetBtn">Alle vinkjes van deze lijst wissen</button>
    </div>

    <footer>Paklijst voor onderweg · werkt ook offline</footer>
  </div>

<script>
  const CATEGORIES = [
    { name: "Kleding", emoji: "👕", items: [
      { n: "Onderbroeken", q: "14", note: "Liever te veel dan te weinig — eentje voor elke dag." },
      { n: "Paar sokken", q: "10", note: "Neem een paar dikkere, naadloze (sport/wandel)sokken mee om blaren te voorkomen." },
      { n: "T-shirts", q: "", note: "Mix van gewone shirts voor de stad en sneldrogende sportshirts voor de hikes." },
      { n: "Lange broeken", q: "2", note: "Bijv. 1 spijkerbroek en 1 comfortabele broek/chino voor reizen en de stad." },
      { n: "Sport- of wandelbroek", q: "1", note: "Sneldrogend! Essentieel voor de wandelingen (geen katoen)." },
      { n: "Korte broek", q: "1", note: "Voor warme dagen in Glasgow of Edinburgh." },
      { n: "Dikke trui of hoodie", q: "1", note: "Voor de gezellige, frissere avonden." },
      { n: "Fleecevest of sportvest met rits (of extra trui)", q: "1", note: "Ideaal als extra laagje onder je jas of over je t-shirt." },
      { n: "Nachtkleding", q: "", note: "" }
    ]},
    { name: "Schoenen & Accessoires", emoji: "🥾", items: [
      { n: "Paar wandelschoenen of stevige trail-sneakers", q: "1", note: "Schoenen met een goed profiel. Zorg dat je ze al hebt ingelopen!" },
      { n: "Paar comfortabele stads-sneakers", q: "1", note: "Voor in de auto, pub en de steden." },
      { n: "Dagrugzak(je)", q: "1", note: "Handig voor je waterfles, snacks en regenjas tijdens wandelingen." },
      { n: "Zonnebril en/of pet", q: "1", note: "Tegen felle zon of inwaaiende regen." },
      { n: "Herbruikbare waterfles", q: "1", note: "Het kraanwater in Schotland is superlekker." }
    ]},
    { name: "Toiletartikelen", emoji: "🧴", items: [
      { n: "Tandenborstel & tandpasta", q: "1", note: "" },
      { n: "Deodorant", q: "1", note: "" },
      { n: "Haarborstel / kam", q: "1", note: "" },
      { n: "Persoonlijke verzorging", q: "1", note: "Gezichtscrème, lenzenvloeistof, etc." },
      { n: "Zonnebrandcrème", q: "1", note: "Ja, de Schotse zon kan fel zijn!" },
      { n: "Blarenpleisters", q: "1", note: "Absoluut noodzakelijk." }
    ]},
    { name: "Elektronica", emoji: "🔌", items: [
      { n: "Oplader met snoertje voor telefoon", q: "1", note: "" },
      { n: "Powerbank + oplaadsnoertje", q: "1", note: "Omdat de batterij snel leeg gaat van al die foto's en navigatie." },
      { n: "Koptelefoon / oortjes", q: "1", note: "Voor tijdens de vlucht en langere autoritten." },
      { n: "Wereldstekker Type G", q: "1", note: "Grote Engelse stekker met 3 pinnen — eventueel centraal geregeld voor het gezin." }
    ]}
  ];

  const KIDS = { nora: "Nora", mats: "Mats" };
  const STORE_KEY = "paklijst-schotland-2026-v1";
  const TAB_KEY = "paklijst-schotland-2026-active";

  // stable id per item (category-slug + item-slug), independent of order
  const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 40);
  CATEGORIES.forEach(c => c.items.forEach(it => { it.id = slug(c.name) + "__" + slug(it.n); }));
  const ALL_IDS = CATEGORIES.flatMap(c => c.items.map(i => i.id));

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  }
  let state = loadState();
  function kidState(kid) { return (state[kid] = state[kid] || {}); }
  function saveState() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  let active = localStorage.getItem(TAB_KEY) || "nora";
  if (!KIDS[active]) active = "nora";

  const listEl = document.getElementById("list");
  const tabs = Array.from(document.querySelectorAll(".tab"));

  function buildList() {
    listEl.innerHTML = CATEGORIES.map(cat => `
      <section class="cat">
        <h2 class="cat-head">
          <span class="cat-emoji" aria-hidden="true">${cat.emoji}</span>
          <span>${cat.name}</span>
          <span class="cat-count" data-cat="${slug(cat.name)}"></span>
        </h2>
        <ul class="items">
          ${cat.items.map(it => `
            <li class="item">
              <label>
                <input type="checkbox" data-id="${it.id}">
                <span class="box" aria-hidden="true"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
                <span class="txt">
                  <span class="name-row">
                    <span class="name">${it.n}</span>
                    ${it.q ? `<span class="qty">${it.q}×</span>` : ``}
                  </span>
                  ${it.note ? `<span class="note">${it.note}</span>` : ``}
                </span>
              </label>
            </li>`).join("")}
        </ul>
      </section>`).join("");

    listEl.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", () => {
        const ks = kidState(active);
        if (cb.checked) ks[cb.dataset.id] = true; else delete ks[cb.dataset.id];
        saveState();
        refresh();
      });
    });
  }

  function refresh() {
    document.body.dataset.active = active;
    tabs.forEach(t => t.setAttribute("aria-selected", String(t.dataset.kid === active)));
    document.getElementById("progressWho").textContent = KIDS[active] + "'s koffer";

    const ks = kidState(active);
    // restore checkboxes
    listEl.querySelectorAll("input[type=checkbox]").forEach(cb => { cb.checked = !!ks[cb.dataset.id]; });

    // per-category counts
    CATEGORIES.forEach(cat => {
      const done = cat.items.filter(i => ks[i.id]).length;
      const el = listEl.querySelector(`.cat-count[data-cat="${slug(cat.name)}"]`);
      if (el) el.textContent = `${done}/${cat.items.length}`;
    });

    const done = ALL_IDS.filter(id => ks[id]).length;
    const total = ALL_IDS.length;
    document.getElementById("progressCount").textContent = `${done} / ${total} ingepakt`;
    document.getElementById("progressBar").style.width = (total ? (done / total * 100) : 0) + "%";
    document.getElementById("celebrate").classList.toggle("show", done === total && total > 0);
  }

  tabs.forEach(t => t.addEventListener("click", () => {
    active = t.dataset.kid;
    localStorage.setItem(TAB_KEY, active);
    refresh();
  }));

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm(`Alle vinkjes van ${KIDS[active]} wissen?`)) {
      state[active] = {};
      saveState();
      refresh();
    }
  });

  buildList();
  refresh();
</script>
</body>
</html>
